<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>一二布布大冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:'PingFang SC','Microsoft YaHei',sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block;margin:0 auto}
#mbtns{position:fixed;bottom:24px;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-end;padding:0 16px;pointer-events:none}
#mbtns>*{pointer-events:auto}
.mbtn{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center}
.mbtn:active{background:rgba(255,255,255,0.28)}
#jbtn{width:84px;height:84px;border-radius:50%;background:rgba(255,200,50,0.2);border:2px solid rgba(255,200,50,0.4);color:#ffc832;font-size:18px;font-weight:bold;letter-spacing:2px}
#jbtn:active{background:rgba(255,200,50,0.45)}
@media(min-width:768px){#mbtns{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="mbtns">
  <div class="mbtn" id="lbtn">◀</div>
  <div class="mbtn" id="rbtn">▶</div>
  <div id="jbtn">跳跃</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const GW=500,GH=300;
let sc,W,H;

function rs(){
  sc=Math.min(innerWidth/GW,innerHeight/GH);
  W=canvas.width=GW*sc; H=canvas.height=GH*sc;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
}
rs();addEventListener('resize',rs);

// ── Audio ──
let ac;
function snd(f,d,t='square',v=0.04,dl=0){
  if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();
  const tm=ac.currentTime+dl,o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);
  o.connect(g);g.connect(ac.destination);o.start(tm);o.stop(tm+d);
}
function jmp(){snd(350,0.08,'square',0.03);snd(550,0.07,'square',0.025,0.04)}
function coin(){snd(988,0.07,'square',0.04);snd(1319,0.1,'square',0.04,0.05)}
function stomp(){snd(250,0.08,'sawtooth',0.03);snd(450,0.06,'square',0.025,0.04)}
function hurt(){snd(100,0.35,'sawtooth',0.06);snd(70,0.4,'triangle',0.05,0.12)}
function winSnd(){snd(523,0.12,'square',0.04);snd(659,0.12,'square',0.04,0.1);snd(784,0.12,'square',0.04,0.2);snd(1047,0.25,'square',0.05,0.3)}
function bump(){snd(180,0.1,'triangle',0.04);snd(220,0.08,'square',0.03,0.03)}

// ── Game ──
let state,score,coins,lives,level,camX;
let player,blocks,enemies,pipes,flag,particles,keys,popups;
let shakeT,shakeA;

const GR=1500,PS=190,JV=-490;
const TILE=32;
const GROUND=GH-48;

// ── Level data ──
function buildLevel(lv){
  const blk=[],en=[],pp=[];

  // Ground
  const gs=[{x:0,w:14},{x:16,w:6},{x:25,w:6},{x:34,w:6},{x:43,w:6},{x:52,w:5},{x:61,w:4},
    {x:70,w:6},{x:79,w:6},{x:88,w:8},{x:100,w:6},{x:110,w:4},{x:120,w:6},{x:130,w:5},
    {x:139,w:8},{x:150,w:5},{x:160,w:6},{x:170,w:4},{x:180,w:5},{x:190,w:12}];
  for(const s of gs)for(let x=s.x;x<s.x+s.w;x++)blk.push({x:x*TILE,y:GROUND,type:'ground'});

  // Brick rows
  const bricks=[
    [20,GROUND-4*TILE,6],[30,GROUND-4*TILE,4],[50,GROUND-4*TILE,3],
    [68,GROUND-4*TILE,8],[85,GROUND-4*TILE,4],[110,GROUND-4*TILE,3],
    [128,GROUND-3*TILE,5],[145,GROUND-4*TILE,4],[160,GROUND-4*TILE,6],
    [178,GROUND-3*TILE,3],[185,GROUND-5*TILE,4],
  ];
  for(const b of bricks)for(let x=b[0];x<b[0]+b[2];x++)blk.push({x:x*TILE,y:b[1],type:'brick'});

  // Question blocks
  const qs=[
    [16,GROUND-4*TILE],[22,GROUND-4*TILE],[24,GROUND-4*TILE],
    [32,GROUND-4*TILE],[42,GROUND-2*TILE],[56,GROUND-4*TILE],
    [72,GROUND-4*TILE],[80,GROUND-4*TILE],[90,GROUND-2*TILE],
    [102,GROUND-4*TILE],[112,GROUND-4*TILE],[122,GROUND-4*TILE],
    [132,GROUND-4*TILE],[148,GROUND-2*TILE],[155,GROUND-4*TILE],
    [168,GROUND-2*TILE],[175,GROUND-4*TILE],[188,GROUND-4*TILE],
  ];
  for(const q of qs)blk.push({x:q[0]*TILE,y:q[1],type:'question',hit:false});

  // Hidden blocks (invisible until hit)
  const hd=[
    [42,GROUND-6*TILE],[90,GROUND-6*TILE],[148,GROUND-6*TILE],
    [168,GROUND-6*TILE],[102,GROUND-6*TILE],[132,GROUND-6*TILE],
  ];
  for(const h of hd)blk.push({x:h[0]*TILE,y:h[1],type:'hidden',hit:false});

  // Pipes
  pp.push({x:29*TILE,y:GROUND-2*TILE,h:2});
  pp.push({x:38*TILE,y:GROUND-2*TILE,h:2});
  pp.push({x:65*TILE,y:GROUND-2*TILE,h:2});
  pp.push({x:95*TILE,y:GROUND-3*TILE,h:3});
  pp.push({x:116*TILE,y:GROUND-2*TILE,h:2});
  pp.push({x:156*TILE,y:GROUND-2*TILE,h:2});
  pp.push({x:182*TILE,y:GROUND-3*TILE,h:3});

  // Enemies (between pipes and on platforms)
  const enemyPos=[
    [7*TILE,GROUND],[14*TILE,GROUND],[22*TILE,GROUND],
    [32*TILE,GROUND],[40*TILE,GROUND],[48*TILE,GROUND],
    [58*TILE,GROUND],[68*TILE,GROUND],[78*TILE,GROUND],
    [90*TILE,GROUND],[100*TILE,GROUND],[108*TILE,GROUND],
    [118*TILE,GROUND],[128*TILE,GROUND],[140*TILE,GROUND],
    [152*TILE,GROUND],[164*TILE,GROUND],[176*TILE,GROUND],
    [186*TILE,GROUND],
  ];
  for(const e of enemyPos)en.push({x:e[0]+TILE/2,y:e[1]-28,dir:Math.random()>0.5?1:-1,alive:true,stun:0});

  const fx=192*TILE;
  return{blk,en,pp,fx,totalCoins:qs.length+hd.length};
}

function init(lv){
  level=lv||1;coins=0;camX=0;
  const d=buildLevel(level);
  blocks=d.blk;enemies=d.en;pipes=d.pp;
  flag={x:d.fx,y:GROUND};
  player={x:80,y:0,w:26,h:32,vx:0,vy:0,onGround:false,facing:1,animT:0,inv:0,alive:true,big:false};
  particles=[];popups=[];
  state='play';shakeT=0;shakeA=0;

  // HUD drawn on canvas
}

function initGame(){lives=3;score=0;init(1)}
if(typeof lives==='undefined')initGame();

// ── Collision helpers ──
function rectCol(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function getBlocksAt(x,y,w,h){return blocks.filter(b=>rectCol({x:x,y:y,w:w,h:h},{x:b.x,y:b.y,w:TILE,h:TILE}))}

// ── Popups ──
function popup(x,y,txt,col='#fff'){popups.push({x,y,txt,col,life:0.8,vy:-60})}

// ── Particles ──
function sp(x,y,c,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*200,vy:-Math.random()*300-60,life:.35+Math.random()*.5,ml:.35+Math.random()*.5,size:2+Math.random()*3,color:c});
}

// ── Input ──
keys={};
onkeydown=e=>{keys[e.code]=1;if(['Space','ArrowUp','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()};
onkeyup=e=>{keys[e.code]=0};
canvas.onpointerdown=e=>{e.preventDefault();if(state==='over'){initGame();return}if(state==='win'){init(level+1);return}keys['Jump']=1};
canvas.onpointerup=()=>{keys['Jump']=0};

['lbtn','rbtn'].forEach((id,k)=>{
  const el=document.getElementById(id);
  const key=k?'ArrowRight':'ArrowLeft';
  el.onpointerdown=e=>{e.preventDefault();e.stopPropagation();keys[key]=1};
  el.onpointerup=e=>{e.preventDefault();e.stopPropagation();keys[key]=0};
  el.onpointerleave=()=>{keys[key]=0};
});
const jb=document.getElementById('jbtn');
jb.onpointerdown=e=>{e.preventDefault();e.stopPropagation();keys['Jump']=1};
jb.onpointerup=e=>{e.preventDefault();e.stopPropagation();keys['Jump']=0};
jb.onpointerleave=()=>{keys['Jump']=0};

// ── Update ──
let lt=performance.now(),coinAnimT=0;

function update(dt){
  if(state!=='play'){updateFX(dt);return}
  dt=Math.min(dt,.05);
  coinAnimT+=dt;

  // Input
  if(player.alive){
    let mx=0;
    if(keys['ArrowLeft']||keys['KeyA'])mx=-1;
    if(keys['ArrowRight']||keys['KeyD'])mx=1;
    player.vx=mx*PS;
    if(mx)player.facing=mx;
    player.animT+=dt*(Math.abs(mx)>0?11:2.5);

    if(keys['Jump']&&player.onGround){player.vy=JV;player.onGround=false;jmp()}
    // Variable jump height
    if(!keys['Jump']&&player.vy<JV*0.4)player.vy*=0.85;

    player.vy+=GR*dt;
    player.x+=player.vx*dt;
    player.y+=player.vy*dt;
    player.x=Math.max(10,Math.min(192*TILE,player.x));

    // Ground collision
    player.onGround=false;
    if(player.y+player.h>=GROUND){player.y=GROUND-player.h;player.vy=0;player.onGround=true}

    // Block collision
    const row=[];
    for(const b of blocks){
      if(b.type==='hidden'&&!b.hit)continue;
      if(!rectCol({x:player.x,y:player.y,w:player.w,h:player.h},{x:b.x,y:b.y,w:TILE,h:TILE}))continue;
      row.push(b);
    }
    // Resolve collisions
    for(const b of row){
      const pbot=player.y+player.h,ptop=player.y,pright=player.x+player.w,pleft=player.x;
      const bbot=b.y+TILE,btop=b.y,bright=b.x+TILE,bleft=b.x;
      const prevBot=player.y-player.vy*dt+player.h;
      const prevTop=player.y-player.vy*dt;
      const prevRight=player.x-player.vx*dt+player.w;
      const prevLeft=player.x-player.vx*dt;

      // Landing on top
      if(prevBot<=btop+6&&player.vy>=0&&pright>bleft+4&&pleft<bright-4){
        player.y=btop-player.h;player.vy=0;player.onGround=true;
      }
      // Hitting from below
      else if(prevTop>=bbot-6&&player.vy<0&&pright>bleft+4&&pleft<bright-4){
        player.y=bbot;player.vy=1;
        hitBlock(b);
      }
      // Side collision
      else if(prevRight<=bleft+4&&player.vx>0){
        player.x=bleft-player.w;
      }
      else if(prevLeft>=bright-4&&player.vx<0){
        player.x=bright;
      }
    }

    // Pipe collision
    for(const p of pipes){
      const pw=TILE+4,ph=p.h*TILE,py=GROUND-ph;
      if(rectCol({x:player.x,y:player.y,w:player.w,h:player.h},{x:p.x-2,y:py,w:pw,h:ph})){
        // Top of pipe
        if(player.y+player.h-player.vy*dt<=py+4&&player.vy>=0){
          player.y=py-player.h;player.vy=0;player.onGround=true;
        }else if(player.x+player.w-player.vx*dt<=p.x+2&&player.vx>0){
          player.x=p.x-player.w+2;
        }else if(player.x-player.vx*dt>=p.x+pw-4&&player.vx<0){
          player.x=p.x+pw-2;
        }
      }
    }

    // Enemy collision
    for(const e of enemies){
      if(!e.alive||e.stun>0)continue;
      if(Math.abs(player.x+player.w/2-e.x)<22&&Math.abs(player.y+player.h/2-(e.y+14))<24){
        // Stomp
        if(player.vy>0&&player.y+player.h-(e.y)<22){
          e.alive=false;player.vy=-300;stomp();score+=200;
          sp(e.x,e.y,'#f80',12);popup(e.x,e.y-16,'200','#ff0');
        }else if(player.inv<=0){
          hurtPlayer();break;
        }
      }
    }

    // Fall in pit
    if(player.y>GH+80){hurtPlayer()}

    // Invincibility
    if(player.inv>0)player.inv-=dt;

    // Flag
    if(player.x+player.w>flag.x-16&&player.y+player.h>flag.y-96){win()}
  }

  // Camera
  const tc=player.x-GW*.35;
  camX+=(tc-camX)*.08;camX=Math.max(0,Math.min(192*TILE-GW,camX));

  // Enemies
  for(const e of enemies){
    if(!e.alive)continue;if(e.stun>0){e.stun-=dt;continue}
    e.x+=e.dir*55*dt;
    const gnd=blocks.find(b=>b.x<=e.x&&b.x+TILE>=e.x&&Math.abs(b.y-GROUND)<6);
    if(gnd&&(e.x-13<gnd.x||e.x+13>gnd.x+TILE))e.dir*=-1;
  }

  // Popups & particles
  updateFX(dt);

  // Shake
  if(shakeT>0){shakeT-=dt;shakeA*=.88}else shakeA=0;
}

function updateFX(dt){
  for(let i=popups.length-1;i>=0;i--){const p=popups[i];p.life-=dt;p.y+=p.vy*dt;if(p.life<=0)popups.splice(i,1)}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;if(p.life<=0){particles.splice(i,1);continue}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=350*dt}
}

function hitBlock(b){
  if(b.type==='question'&&!b.hit){
    b.hit=true;coins++;score+=100;coin();
    popup(b.x+TILE/2,b.y-12,'+🪙','#ff0');
    sp(b.x+TILE/2,b.y,'#ff0',8);
  }else if(b.type==='hidden'&&!b.hit){
    b.hit=true;coins++;score+=100;coin();
    popup(b.x+TILE/2,b.y-12,'+🪙','#ff0');
    sp(b.x+TILE/2,b.y,'#ff0',8);
  }else if(b.type==='brick'){
    // Break brick
    const idx=blocks.indexOf(b);if(idx>=0)blocks.splice(idx,1);
    bump();sp(b.x+TILE/2,b.y+TILE/2,'#c8956c',10);
    score+=50;
  }else{
    bump();
  }
}

function hurtPlayer(){
  if(player.inv>0)return;
  lives--;player.inv=1.8;shakeT=.3;shakeA=6;hurt();
  sp(player.x+player.w/2,player.y+player.h/2,'#f44',25);
  player.vy=-300;
  if(lives<=0){state='over';sp(player.x+player.w/2,player.y+player.h/2,'#f44',50)}
}
function win(){state='win';winSnd();sp(flag.x,flag.y-40,'#ff0',50);sp(flag.x,flag.y-40,'#0f0',30)}

// ── Draw ──
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.scale(sc,sc);

  const sx=shakeA*(Math.random()-.5)*2,sy=shakeA*(Math.random()-.5)*2;
  ctx.translate(sx,sy);

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,GH);
  sky.addColorStop(0,'#5c94fc');sky.addColorStop(1,'#a0d0ff');
  ctx.fillStyle=sky;ctx.fillRect(0,0,GW,GH);

  // Clouds (parallax)
  ctx.fillStyle='rgba(255,255,255,0.7)';
  for(let i=0;i<8;i++){
    const cx=((i*240+80)-camX*0.15)%(GW+200)-100;
    const cy=30+(i*37)%70;
    ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.arc(cx+28,cy-8,18,0,Math.PI*2);ctx.arc(cx+48,cy+4,20,0,Math.PI*2);ctx.fill();
  }

  // Hills (parallax)
  ctx.fillStyle='#6eb56e';
  ctx.beginPath();ctx.moveTo(0,GH);
  for(let x=-10;x<=GW+10;x+=3){
    const wx=x-camX*.25;ctx.lineTo(x,GROUND-Math.sin(wx*.005)*28-Math.sin(wx*.013)*18);
  }
  ctx.lineTo(GW,GH);ctx.closePath();ctx.fill();
  ctx.fillStyle='#7ec87e';
  ctx.beginPath();ctx.moveTo(0,GH);
  for(let x=-10;x<=GW+10;x+=3){
    const wx=x-camX*.5;ctx.lineTo(x,GROUND-Math.sin(wx*.008)*22-Math.sin(wx*.018)*12);
  }
  ctx.lineTo(GW,GH);ctx.closePath();ctx.fill();

  ctx.save();ctx.translate(-camX,0);

  // Blocks
  for(const b of blocks){
    if(b.type==='hidden'&&!b.hit)continue;
    const bx=b.x,by=b.y;

    if(b.type==='ground'){
      ctx.fillStyle='#c8956c';ctx.fillRect(bx,by,TILE,TILE);
      ctx.fillStyle='#7ec850';ctx.fillRect(bx,by,TILE,6);
      ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(bx+8,by+12,TILE-16,TILE-12);
    }else if(b.type==='brick'){
      ctx.fillStyle='#c8956c';ctx.fillRect(bx,by,TILE,TILE);
      ctx.strokeStyle='#333';ctx.lineWidth=1;
      ctx.strokeRect(bx+.5,by+.5,TILE-1,TILE-1);
      ctx.beginPath();ctx.moveTo(bx,by+TILE/2);ctx.lineTo(bx+TILE,by+TILE/2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+TILE/2,by+TILE/2);ctx.lineTo(bx+TILE/2,by+TILE);ctx.stroke();
    }else if(b.type==='question'||b.type==='hidden'){
      const bob=b.type==='hidden'?0:Math.sin(coinAnimT*4+b.x)*1;
      ctx.fillStyle=b.hit?'#8b7355':'#f0b028';
      ctx.fillRect(bx,by+bob,TILE,TILE);
      ctx.strokeStyle='#6b4410';ctx.lineWidth=1.5;
      ctx.strokeRect(bx+.5,by+bob+.5,TILE-1,TILE-1);
      if(b.type==='question'&&!b.hit){
        ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
        ctx.fillText('?',bx+TILE/2,by+bob+23);
      }
    }
  }

  // Pipes
  for(const p of pipes){
    const pw=TILE+4,ph=p.h*TILE,py=GROUND-ph;
    // Body
    ctx.fillStyle='#4caf50';ctx.fillRect(p.x,py+8,pw,ph-8);
    ctx.fillStyle='#66bb6a';ctx.fillRect(p.x,py+8,6,ph-8);
    ctx.fillStyle='#388e3c';ctx.fillRect(p.x+pw-6,py+8,6,ph-8);
    // Top rim
    ctx.fillStyle='#4caf50';ctx.fillRect(p.x-4,py,pw+8,16);
    ctx.fillStyle='#66bb6a';ctx.fillRect(p.x-4,py,pw+8,5);
    ctx.fillStyle='#388e3c';ctx.fillRect(p.x-4,py+12,pw+8,4);
  }

  // Flag
  ctx.fillStyle='#888';ctx.fillRect(flag.x-3,flag.y-112,6,112);
  ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(flag.x,flag.y-112,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f44';
  ctx.beginPath();ctx.moveTo(flag.x,flag.y-108);ctx.lineTo(flag.x+36,flag.y-98);ctx.lineTo(flag.x,flag.y-88);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='left';ctx.fillText('终点',flag.x-10,flag.y-120);

  // Enemies (Goomba style)
  for(const e of enemies){
    if(!e.alive)continue;
    const ex=e.x,ey=e.y;
    // Body
    ctx.fillStyle='#8B4513';ctx.beginPath();ctx.arc(ex,ey,14,Math.PI,0);ctx.fill();
    ctx.fillStyle='#A0522D';ctx.fillRect(ex-14,ey-4,28,16);
    ctx.fillStyle='#8B4513';ctx.beginPath();ctx.arc(ex,ey+10,14,0,Math.PI);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex-4,ey-3,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ex+4,ey-3,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex-4+e.dir*1.5,ey-3,2.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(ex+4+e.dir*1.5,ey-3,2.8,0,Math.PI*2);ctx.fill();
    // Angry brows
    ctx.strokeStyle='#111';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ex-8,ey-8);ctx.lineTo(ex-2,ey-6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex+8,ey-8);ctx.lineTo(ex+2,ey-6);ctx.stroke();
    // Feet
    ctx.fillStyle='#222';ctx.fillRect(ex-10,ey+8,8,5);ctx.fillRect(ex+2,ey+8,8,5);
  }

  // Player - 一二 (White Panda)
  if(player.alive&&(player.inv<=0||Math.floor(player.inv*12)%2===0)){
    drawYiEr(player.x+player.w/2,player.y+player.h/2,player.facing,player.animT,player.onGround,player.vy);
  }

  // Popups
  for(const p of popups){
    const a=p.life/.8;
    ctx.fillStyle=p.col;ctx.globalAlpha=a;
    ctx.font='bold 15px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    ctx.fillText(p.txt,p.x,p.y);
  }
  ctx.globalAlpha=1;

  // Particles
  for(const p of particles){
    const a=p.life/p.ml;
    ctx.fillStyle=p.color;ctx.globalAlpha=a;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  }
  ctx.globalAlpha=1;

  ctx.restore(); // world translate

  // ── HUD ──
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,0,GW,34);
  ctx.fillStyle='#fff';ctx.font='bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign='left';ctx.fillText('一二',16,22);
  ctx.fillText('🪙 '+coins,68,22);
  ctx.fillText('⭐ '+score,148,22);
  ctx.textAlign='center';ctx.fillText('WORLD '+level,GWW(),22);
  function GWW(){return GW/2}
  ctx.textAlign='right';
  let ht='';for(let i=0;i<lives;i++)ht+='❤️';
  ctx.fillText(ht,GW-14,22);

  // State overlays
  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,GW,GH);
    ctx.fillStyle='#fff';ctx.font='bold 26px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    ctx.fillText('游戏结束',GW/2,GH/2-16);
    ctx.font='15px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('点击重新开始',GW/2,GH/2+24);
  }
  if(state==='win'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,GW,GH);
    ctx.fillStyle='#ff0';ctx.font='bold 26px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    ctx.fillText('🎉 通关!',GW/2,GH/2-16);
    ctx.fillStyle='#fff';ctx.font='15px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('🪙'+coins+' ⭐'+score+' ❤️x'+lives,GW/2,GH/2+20);
    ctx.fillText('点击进入第'+(level+1)+'关',GW/2,GH/2+46);
  }

  ctx.restore(); // main scale
}

// ── Draw 一二 (White Panda) ──
function drawYiEr(x,y,facing,animT,onGround,vy){
  ctx.save();ctx.translate(x,y);ctx.scale(facing,1);

  // Squash & stretch
  let sx=1,sy=1;
  if(!onGround&&vy<-100){sx=.9;sy=1.1}
  else if(!onGround&&vy>200){sx=1.15;sy=.85}
  ctx.scale(sx,sy);

  const bob=onGround?Math.abs(Math.sin(animT))*2:0;
  ctx.translate(0,bob);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(0,15,12,3.5,0,0,Math.PI*2);ctx.fill();

  // ── BLACK FEET (一二特征!) ──
  const footOff=onGround?Math.sin(animT)*2:0;
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.ellipse(-6,13+footOff,6,4.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(6,13-footOff,6,4.5,0,0,Math.PI*2);ctx.fill();

  // ── WHITE BODY ──
  const bodyGrad=ctx.createRadialGradient(-2,-3,3,0,1,17);
  bodyGrad.addColorStop(0,'#FFFFFF');
  bodyGrad.addColorStop(0.6,'#FEFEFE');
  bodyGrad.addColorStop(1,'#E8E8E8');
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();ctx.ellipse(0,0,15,16,0,0,Math.PI*2);ctx.fill();
  // Subtle outline
  ctx.strokeStyle='rgba(180,180,180,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(0,0,15,16,0,0,Math.PI*2);ctx.stroke();

  // ── BLACK EARS (一二特征!) ──
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(-9,-12,5.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(9,-12,5.5,0,Math.PI*2);ctx.fill();
  // Ear inner highlight
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(-9,-12,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(9,-12,2.5,0,Math.PI*2);ctx.fill();

  // ── FACE ──
  // Eyes (simple dots, like the real sticker)
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(-4.5,-1.5,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4.5,-1.5,3,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-3.8,-2.3,1.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5.2,-2.3,1.2,0,Math.PI*2);ctx.fill();

  // Blush (pink circles)
  ctx.fillStyle='rgba(255,160,160,0.5)';
  ctx.beginPath();ctx.ellipse(-8,4,4.5,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(8,4,4.5,3,0,0,Math.PI*2);ctx.fill();

  // Mouth (tiny curve)
  ctx.strokeStyle='#b88';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,4.5,3.5,0.2,Math.PI-0.2);ctx.stroke();

  // ── BLACK BOW TIE (一二特征!) ──
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(-7,5);ctx.lineTo(-7,11);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(7,5);ctx.lineTo(7,11);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(0,8,2.5,0,Math.PI*2);ctx.fill();

  // ── WHITE ARMS (stubby) ──
  const armSw=Math.sin(animT)*.4;
  ctx.fillStyle='#FAFAFA';
  ctx.strokeStyle='rgba(180,180,180,0.25)';ctx.lineWidth=.8;
  ctx.save();ctx.translate(-12,2);ctx.rotate(-.25+armSw);
  ctx.beginPath();ctx.ellipse(0,0,7,4.5,.1,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.restore();
  ctx.save();ctx.translate(12,2);ctx.rotate(.25-armSw);
  ctx.beginPath();ctx.ellipse(0,0,7,4.5,-.1,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.restore();

  ctx.restore();
}

// ── Loop ──
(function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lt)/1000,.1);lt=now;
  update(dt);draw();
})(performance.now());

initGame();
</script>
