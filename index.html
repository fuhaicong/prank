<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; overflow:hidden; touch-action:none;
  font-family:'Segoe UI','PingFang SC',sans-serif;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
canvas { display:block; margin:0 auto; }
#ui {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; justify-content:center; padding:20px; pointer-events:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<script>
// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const GAME_W = 420;
const GAME_H = 640;
let scale;

function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  scale = Math.min(maxW / GAME_W, maxH / GAME_H);
  canvas.width = GAME_W * scale;
  canvas.height = GAME_H * scale;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Audio ──
let audioCtx;
function beep(freq, dur, type='square', vol=0.06, delay=0) {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const t = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+dur);
}
function sfxFlap() { beep(420, 0.08, 'square', 0.04); beep(620, 0.06, 'square', 0.03, 0.02); }
function sfxScore() { beep(880, 0.1, 'sine', 0.06); beep(1100, 0.12, 'sine', 0.05, 0.06); }
function sfxHit() { beep(120, 0.3, 'sawtooth', 0.1); beep(80, 0.4, 'triangle', 0.08, 0.1); }
function sfxSwoosh() { beep(600, 0.15, 'sine', 0.02); beep(300, 0.2, 'sine', 0.02, 0.05); }

// ── Game state ──
let state; // 'wait' | 'play' | 'over'
let score, best;
let bird, pipes, ground, bg, particles;

const GRAVITY = 1400;
const FLAP_VEL = -420;
const PIPE_W = 58;
const PIPE_GAP = 150;
const PIPE_SPEED = 140;
const PIPE_SPAWN_INTERVAL = 1.7;
const GROUND_H = 80;
const GROUND_Y = GAME_H - GROUND_H;

function init() {
  score = 0;
  state = 'wait';

  bird = {
    x: GAME_W * 0.28,
    y: GAME_H * 0.45,
    vy: 0,
    rot: 0,
    wingT: 0,
  };

  pipes = [];
  ground = { x: 0 };
  bg = { clouds: genClouds() };
  particles = [];
  spawnPipe();

  if(best===undefined) best = +localStorage.getItem('fbBest')||0;
}

function genClouds() {
  const c = [];
  for(let i=0;i<5;i++) c.push({ x:Math.random()*GAME_W, y:40+Math.random()*160, w:60+Math.random()*80, speed:15+Math.random()*20 });
  return c;
}

function spawnPipe() {
  const minH = 100;
  const maxH = GAME_H - GROUND_H - PIPE_GAP - minH;
  const topH = minH + Math.random() * maxH;
  pipes.push({ x: GAME_W + 20, topH, scored: false });
}

// ── Input ──
function flap() {
  if(state==='wait') { state='play'; bird.vy=FLAP_VEL; sfxFlap(); return; }
  if(state==='play') { bird.vy=FLAP_VEL; bird.rot=-0.5; sfxFlap(); sfxSwoosh(); return; }
  // Over: restart after brief delay
  if(state==='over') { init(); }
}

canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
document.addEventListener('keydown', e => { if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); flap(); } });

// ── Update ──
let lastTime = performance.now();
let pipeTimer = 0;

function update(dt) {
  if(state==='wait') {
    // Gentle bobbing
    bird.y += Math.sin(performance.now()/400) * 0.5;
    bird.wingT += dt * 8;
    return;
  }

  if(state==='play') {
    // Bird physics
    bird.vy += GRAVITY * dt;
    bird.y += bird.vy * dt;
    bird.wingT += dt * 18;
    // Rotation
    const targetRot = bird.vy > 0 ? Math.min(bird.vy/600, 1.2) : -0.4;
    bird.rot += (targetRot - bird.rot) * 0.15;

    // Move pipes
    for(const p of pipes) p.x -= PIPE_SPEED * dt;

    // Remove off-screen pipes
    if(pipes.length && pipes[0].x < -PIPE_W - 20) pipes.shift();

    // Spawn pipes
    pipeTimer += dt;
    if(pipeTimer >= PIPE_SPAWN_INTERVAL) { pipeTimer=0; spawnPipe(); }

    // Score
    for(const p of pipes) {
      if(!p.scored && p.x + PIPE_W/2 < bird.x) { p.scored=true; score++; sfxScore(); break; }
    }

    // Collision detection
    if(bird.y < -10 || bird.y + 26 > GROUND_Y) { die(); return; }

    for(const p of pipes) {
      const bx = bird.x - 17, bw = 34, by = bird.y - 15, bh = 30;
      if(bx + bw > p.x && bx < p.x + PIPE_W) {
        if(by < p.topH || by + bh > p.topH + PIPE_GAP) { die(); return; }
      }
    }

    // Ground scroll
    ground.x = (ground.x - PIPE_SPEED * dt) % 24;
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.life -= dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 600*dt;
  }

  // Clouds
  for(const c of bg.clouds) {
    c.x -= c.speed * dt;
    if(c.x < -c.w) c.x = GAME_W + c.w;
  }
}

function die() {
  state='over'; sfxHit();
  // Death particles
  for(let i=0;i<30;i++) {
    particles.push({
      x: bird.x, y: bird.y, vx: (Math.random()-0.5)*400, vy: -Math.random()*500-100,
      life: 0.5+Math.random()*0.8, maxLife: 0.5+Math.random()*0.8,
      size: 2+Math.random()*5,
      color: ['#f90','#fc0','#fff','#f60'][Math.floor(Math.random()*4)]
    });
  }

  if(score>best) { best=score; localStorage.setItem('fbBest',best); }
}

// ── Draw ──
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(scale, scale);

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,GAME_H);
  sky.addColorStop(0,'#4ec0ca');
  sky.addColorStop(0.7,'#7dd8e0');
  sky.addColorStop(1,'#a8e6cf');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,GAME_W,GAME_H);

  // Clouds
  for(const c of bg.clouds) {
    ctx.fillStyle='rgba(255,255,255,0.7)';
    drawCloud(c.x, c.y, c.w);
  }

  // Pipes
  for(const p of pipes) {
    const capH = 30;
    const capW = PIPE_W + 12;

    // Top pipe
    ctx.fillStyle='#5a9e3e';
    ctx.fillRect(p.x, 0, PIPE_W, p.topH);
    ctx.fillStyle='#6db84d';
    ctx.fillRect(p.x-6, p.topH-capH, capW, capH);
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(p.x+4, 0, 8, p.topH-capH);

    // Bottom pipe
    const botY = p.topH + PIPE_GAP;
    ctx.fillStyle='#5a9e3e';
    ctx.fillRect(p.x, botY, PIPE_W, GAME_H-botY);
    ctx.fillStyle='#6db84d';
    ctx.fillRect(p.x-6, botY, capW, capH);
    // Highlight
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(p.x+4, botY+capH, 8, GAME_H-botY-capH);
  }

  // Ground
  const gndGrad = ctx.createLinearGradient(0,GROUND_Y,0,GAME_H);
  gndGrad.addColorStop(0,'#8bc34a');
  gndGrad.addColorStop(0.02,'#7cb342');
  gndGrad.addColorStop(0.15,'#d4a84b');
  gndGrad.addColorStop(0.3,'#c9953b');
  gndGrad.addColorStop(1,'#8b6914');
  ctx.fillStyle = gndGrad;
  ctx.fillRect(0,GROUND_Y,GAME_W,GROUND_H);

  // Ground grass stripe
  ctx.fillStyle='#8bc34a';
  ctx.fillRect(0,GROUND_Y,GAME_W,6);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(0,GROUND_Y,400,2);

  // Ground moving dashes
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=2;
  ctx.setLineDash([12, 18]);
  ctx.lineDashOffset = -ground.x;
  ctx.beginPath();
  ctx.moveTo(0,GROUND_Y+12);
  ctx.lineTo(GAME_W,GROUND_Y+12);
  ctx.stroke();
  ctx.setLineDash([]);

  // Bird
  drawBird(bird.x, bird.y, bird.rot, bird.wingT);

  // Particles
  for(const p of particles) {
    const a = p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.globalAlpha=a;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha=1;

  // Score (during play)
  if(state==='play'||state==='over') {
    ctx.fillStyle='#fff';
    ctx.font='bold 52px "Segoe UI","PingFang SC",sans-serif';
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.3)';
    ctx.lineWidth=4;
    ctx.strokeText(score, GAME_W/2, 80);
    ctx.fillText(score, GAME_W/2, 80);
  }

  // Wait state text
  if(state==='wait') {
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='bold 22px "Segoe UI","PingFang SC",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('点击屏幕开始', GAME_W/2, GAME_H*0.62);
    ctx.font='14px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillText('或按空格键', GAME_W/2, GAME_H*0.62+28);
  }

  // Game over
  if(state==='over') {
    // Overlay
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(0,0,GAME_W,GAME_H);

    // Score card
    const cx=GAME_W/2, cy=GAME_H*0.38;
    ctx.fillStyle='#f5e6c8';
    roundRect(cx-115, cy-30, 230, 200, 14);

    ctx.fillStyle='#555';
    ctx.font='bold 20px "Segoe UI","PingFang SC",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('游戏结束', cx, cy+6);

    // Medal
    const medalCY = cy+55;
    let medalColor, medalText;
    if(score>=30){ medalColor='#ffd700'; medalText='🥇'; }
    else if(score>=15){ medalColor='#c0c0c0'; medalText='🥈'; }
    else if(score>=5){ medalColor='#cd7f32'; medalText='🥉'; }
    else { medalColor='#999'; medalText='💀'; }

    ctx.font='42px sans-serif';
    ctx.fillText(medalText, cx-70, medalCY+12);
    ctx.font='bold 28px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillStyle='#333';
    ctx.fillText(score, cx+20, medalCY+4);
    ctx.font='12px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillStyle='#888';
    ctx.fillText('本局得分', cx+20, medalCY+18);

    ctx.fillStyle='#666';
    ctx.font='16px "Segoe UI","PingFang SC",sans-serif';
    ctx.fillText('最高分: '+best, cx, medalCY+52);

    // New best
    if(score>=best && score>0) {
      ctx.fillStyle='#f90';
      ctx.font='bold 14px "Segoe UI","PingFang SC",sans-serif';
      ctx.fillText('🎉 新纪录!', cx, medalCY+75);
    }

    ctx.restore(); // from main save
    ctx.save();
    ctx.scale(scale, scale);

    // Restart hint
    ctx.fillStyle='#fff';
    ctx.font='bold 18px "Segoe UI","PingFang SC",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('点击屏幕再来一局', GAME_W/2, GAME_H*0.68);
  }

  ctx.restore();
}

function drawBird(x, y, rot, wingT) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  const wingUp = Math.sin(wingT) * 0.5 + 0.5;

  // Body
  ctx.fillStyle='#f9a825';
  ctx.beginPath();
  ctx.ellipse(0, 0, 17, 15, 0, 0, Math.PI*2);
  ctx.fill();

  // Belly
  ctx.fillStyle='#ffcc80';
  ctx.beginPath();
  ctx.ellipse(-2, 5, 11, 9, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing
  ctx.fillStyle='#f57f17';
  ctx.save();
  ctx.translate(-4, -3);
  ctx.rotate(-0.3 + wingUp*0.8);
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 7, 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Eye (white)
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(8, -6, 7, 0, Math.PI*2);
  ctx.fill();
  // Pupil
  ctx.fillStyle='#222';
  ctx.beginPath();
  ctx.arc(10, -6, 4, 0, Math.PI*2);
  ctx.fill();
  // Pupil highlight
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(11, -7, 1.5, 0, Math.PI*2);
  ctx.fill();

  // Beak
  ctx.fillStyle='#ff6d00';
  ctx.beginPath();
  ctx.moveTo(16, -2);
  ctx.lineTo(24, 1);
  ctx.lineTo(16, 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawCloud(x, y, w) {
  const h = w * 0.4;
  ctx.beginPath();
  ctx.arc(x, y+h*0.4, h*0.5, 0, Math.PI*2);
  ctx.arc(x+w*0.25, y, h*0.6, 0, Math.PI*2);
  ctx.arc(x+w*0.55, y-h*0.1, h*0.7, 0, Math.PI*2);
  ctx.arc(x+w*0.8, y+h*0.2, h*0.45, 0, Math.PI*2);
  ctx.fill();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
}

// ── Game loop ──
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now-lastTime)/1000, 0.1);
  lastTime = now;
  update(dt);
  draw();
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
