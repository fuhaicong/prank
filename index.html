<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Tower · 叠叠高</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e; overflow:hidden; touch-action:none;
  font-family:'Segoe UI','PingFang SC',sans-serif;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
canvas { display:block; }
#ui {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:16px 20px; pointer-events:none;
}
#ui>*{pointer-events:auto}
#score-box {
  background:rgba(0,0,0,0.55); backdrop-filter:blur(10px);
  border-radius:14px; padding:14px 20px; color:#fff; text-align:center;
  border:1px solid rgba(255,255,255,0.1); min-width:80px;
}
#score-box .lbl{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase}
#score-box .val{font-size:38px;font-weight:800;line-height:1.1}
#score-box .best{font-size:11px;color:#777;margin-top:2px}
#combo-pop{color:#ff0;font-size:13px;min-height:17px;margin-top:2px}
#btn-r {
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  color:#fff; padding:10px 18px; border-radius:20px; cursor:pointer;
  font-size:13px; backdrop-filter:blur(10px);
}
#btn-r:hover{background:rgba(255,255,255,0.18)}
#hint {
  position:fixed; bottom:50px; left:50%; transform:translateX(-50%); z-index:10;
  color:rgba(255,255,255,0.35); font-size:13px; pointer-events:none;
  transition:opacity 0.4s;
}
/* Game Over overlay */
#go {
  display:none; position:fixed; inset:0; z-index:20;
  background:rgba(0,0,0,0.65); flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
}
#go .go-score { font-size:72px; font-weight:900; color:#fff; line-height:1; }
#go .go-label { color:#999; font-size:14px; letter-spacing:2px; margin:8px 0 4px; }
#go .go-best { color:#ff0; font-size:18px; margin-bottom:30px; }
#go .go-new { color:#0f0; font-size:13px; animation:pulse 0.8s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#go button {
  background:#fff; color:#000; border:none; padding:14px 40px;
  border-radius:24px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit;
}
#go button:hover{transform:scale(1.05)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="score-box">
    <div class="lbl">层数</div>
    <div class="val" id="score">0</div>
    <div class="best">最高 <span id="best">0</span></div>
    <div id="combo-pop"></div>
  </div>
  <button id="btn-r" onclick="restart()">↻ 重来</button>
</div>
<div id="hint">点击屏幕放置方块</div>

<div id="go">
  <div class="go-label">游戏结束</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-new" id="go-new" style="display:none">🎉 新纪录!</div>
  <div class="go-best">最高 <span id="go-best">0</span> 层</div>
  <button onclick="restart()">再来一局</button>
</div>

<script>
// ── Canvas ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W,H;
function rs(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
rs(); window.addEventListener('resize',rs);

// ── Game ──
const BLOCK_H = 32;
let score, best, combo, camY, targetCamY;
let blockW, blockX, dir, speed, baseSpeed;
let stack;        // [{x, w, y, color}]
let cutPiece;     // {x, y, w, vy, vx, rot, rotV, color, alive}
let state;        // 'play' | 'over'
let particles;
let shake;

const COLORS = [
  '#ff6b6b','#ff8e72','#ffa94d','#ffd43b','#a9e34b',
  '#69db7c','#38d9a9','#4dd9c1','#3bc9db','#4dabf7',
  '#748ffc','#9775fa','#da77f2','#f783ac','#ff6b6b',
];

function init() {
  score=0; combo=0; camY=0; targetCamY=0;
  blockW=clamp(W*0.42, 100, 240);
  blockX=W/2; dir=1;
  baseSpeed=clamp(W*0.5, 200, 380);
  speed=baseSpeed;
  stack=[{x:W/2, w:blockW, y:0, color:COLORS[0]}];
  cutPiece=null; state='play'; particles=[]; shake=0;

  if(best===undefined) best=+localStorage.getItem('stackBest')||0;
  document.getElementById('best').textContent=best;
  document.getElementById('score').textContent='0';
  document.getElementById('combo-pop').textContent='';
  document.getElementById('go').style.display='none';
  document.getElementById('hint').style.opacity='1';
  document.getElementById('hint').textContent='点击屏幕放置方块';
}

function clamp(v,min,max){return v<min?min:v>max?max:v}

// ── Place ──
function place() {
  if(state!=='play') return;
  document.getElementById('hint').style.opacity='0';

  const top = stack[stack.length-1];

  // Overlap
  const L = Math.max(top.x - top.w/2, blockX - blockW/2);
  const R = Math.min(top.x + top.w/2, blockX + blockW/2);
  let newW = R - L;
  let newX = (L + R) / 2;

  if(newW <= 0) { gameOver(); return; }

  const newY = top.y + BLOCK_H;
  const col = COLORS[score % COLORS.length];

  // Perfect detection
  const perf = Math.abs(newW - top.w) < Math.max(3, top.w * 0.03);

  if(perf) {
    newW = top.w; newX = top.x;
    combo++;
    spawnP(newX, newY, '#fff', 18);
    spawnP(newX, newY, '#ff0', 12);
  } else {
    combo=0;
    // Cut piece falls off
    const cutW = top.w - newW;
    if(cutW > 2) {
      const cutX = blockX > top.x
        ? R + cutW/2   // falls right
        : L - cutW/2;  // falls left
      cutPiece = { x:cutX, y:newY, w:cutW, vy:-60, vx:(cutX>top.x?120:-120), rot:0, rotV:(Math.random()-0.5)*10, color:col, alive:true };
    }
    spawnP(newX, newY, col, 6);
    shake = Math.max(0, (top.w - newW) * 0.35);
  }

  stack.push({ x:newX, w:newW, y:newY, color:col });
  score++;
  blockW = newW;
  targetCamY = newY - H * 0.42;
  speed = baseSpeed + score * 6;

  // Toggle direction and reset position
  dir = -dir;
  const margin = blockW/2 + 12;
  blockX = dir>0 ? margin : W - margin;

  updateUI();
  if(score > best) {
    best = score;
    localStorage.setItem('stackBest', best);
    document.getElementById('best').textContent = best;
  }
}

function gameOver() {
  state='over';
  const col = COLORS[Math.max(0,(score-1)) % COLORS.length];
  cutPiece = { x:blockX, y:(stack[stack.length-1]?.y||0)+BLOCK_H, w:blockW, vy:-50, vx:dir*80, rot:0, rotV:dir*5, color:col, alive:true };
  spawnP(blockX, (stack[stack.length-1]?.y||0)+BLOCK_H, '#f44', 50);

  if(score > best) {
    best=score; localStorage.setItem('stackBest',best);
  }

  setTimeout(()=>{
    document.getElementById('go-score').textContent=score;
    document.getElementById('go-best').textContent=best;
    const newEl=document.getElementById('go-new');
    if(score>=best && score>0) newEl.style.display='block';
    else newEl.style.display='none';
    document.getElementById('go').style.display='flex';
    document.getElementById('hint').textContent='';
  }, 600);
}

function updateUI() {
  document.getElementById('score').textContent = score;
  const c=document.getElementById('combo-pop');
  if(combo>=5) c.textContent='🔥 '+combo+'连击!';
  else if(combo>=3) c.textContent='✨ '+combo+'连击';
  else if(combo>=1) c.textContent='完美!';
  else c.textContent='';
}

function restart() { init(); }

// ── Particles ──
function spawnP(x,y,col,n) {
  for(let i=0;i<n;i++) particles.push({
    x, y, vx:(Math.random()-0.5)*350, vy:(Math.random()-1)*200-80,
    life:0.5+Math.random()*0.7, maxLife:0.5+Math.random()*0.7,
    size:2+Math.random()*5, color:col
  });
}

// ── Input ──
canvas.addEventListener('pointerdown',(e)=>{
  e.preventDefault();
  if(state==='over') { restart(); return; }
  place();
});
canvas.addEventListener('touchstart',e=>e.preventDefault());

// ── Loop ──
let lt=performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  let dt = Math.min((now-lt)/1000, 0.1);
  lt=now;

  // Move block
  if(state==='play') {
    blockX += dir * speed * dt;
    const m = blockW/2 + 8;
    if(blockX > W-m) { dir=-1; blockX=W-m; }
    if(blockX < m)   { dir=1;  blockX=m; }
  }

  // Camera
  camY += (targetCamY - camY) * 0.06;

  // Shake
  if(shake>0.1) shake*=0.85; else shake=0;

  // Cut piece
  if(cutPiece&&cutPiece.alive) {
    cutPiece.vy += 1400*dt;
    cutPiece.y += cutPiece.vy*dt;
    cutPiece.x += cutPiece.vx*dt;
    cutPiece.rot += cutPiece.rotV*dt;
    if(cutPiece.y > H+300) { cutPiece.alive=false; spawnP(cutPiece.x, H+50, cutPiece.color, 15); }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=350*dt; p.size*=0.997;
  }

  draw();
}

// ── Draw ──
function draw() {
  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#16213e'); bg.addColorStop(0.5,'#1a1a2e'); bg.addColorStop(1,'#0f3460');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Grid lines on the "wall"
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  const gridOff = (camY*0.3) % 60;
  for(let y=gridOff; y<H; y+=60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const shakeX = shake * (Math.random()-0.5) * 2;
  const shakeY = shake * (Math.random()-0.5) * 2;
  ctx.save();
  ctx.translate(shakeX, shakeY);

  const groundY = H*0.82 + camY;

  // Draw stacked blocks (from bottom up)
  for(const b of stack) {
    const sy = groundY - b.y;
    if(sy < -60 || sy > H+60) continue;

    // Block body
    const grad=ctx.createLinearGradient(0,sy,0,sy+BLOCK_H);
    grad.addColorStop(0, lighten(b.color,0.25));
    grad.addColorStop(0.15, b.color);
    grad.addColorStop(0.85, b.color);
    grad.addColorStop(1, darken(b.color,0.2));
    ctx.fillStyle=grad;
    roundRect(b.x-b.w/2, sy, b.w, BLOCK_H, 4);

    // Top highlight
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(b.x-b.w/2+2, sy, b.w-4, 3);
    // Bottom shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(b.x-b.w/2+2, sy+BLOCK_H-3, b.w-4, 3);
  }

  // Floating block (currently swinging)
  if(state==='play') {
    const top = stack[stack.length-1];
    const sy = groundY - top.y - BLOCK_H;
    const col = COLORS[score % COLORS.length];

    // Ghost shadow on the stack
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.fillRect(blockX-blockW/2, groundY - top.y, blockW, 3);

    // Floating block
    const grad=ctx.createLinearGradient(0,sy,0,sy+BLOCK_H);
    grad.addColorStop(0, lighten(col,0.35));
    grad.addColorStop(0.15, col);
    grad.addColorStop(0.85, col);
    grad.addColorStop(1, darken(col,0.2));
    ctx.fillStyle=grad;
    ctx.globalAlpha=0.88;
    roundRect(blockX-blockW/2, sy-2, blockW, BLOCK_H, 4);
    ctx.globalAlpha=1;
  }

  // Cut piece
  if(cutPiece&&cutPiece.alive) {
    const cp=cutPiece;
    const sy=groundY - cp.y;
    ctx.save();
    ctx.translate(cp.x, sy);
    ctx.rotate(cp.rot);
    ctx.fillStyle=cp.color;
    ctx.globalAlpha=0.75;
    roundRect(-cp.w/2, 0, cp.w, BLOCK_H, 4);
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // Particles
  for(const p of particles) {
    const a=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.globalAlpha=a;
    ctx.fillRect(p.x, groundY-p.y, p.size, p.size);
  }
  ctx.globalAlpha=1;

  ctx.restore();
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
}

function lighten(hex,a){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16)+255*a);
  const g=Math.min(255,((n>>8)&0xFF)+255*a);
  const b=Math.min(255,(n&0xFF)+255*a);
  return `rgb(${r|0},${g|0},${b|0})`;
}
function darken(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgb(${(n>>16)*(1-a)|0},${((n>>8)&0xFF)*(1-a)|0},${(n&0xFF)*(1-a)|0})`;
}

// ── Start ──
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
